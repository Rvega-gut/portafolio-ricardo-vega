<!DOCTYPE html>
<html>
<head>
    <title>Consulta de Compras</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
       $(document).ready(function() {
    $('#search').on('input', function() {
        var query = $(this).val();
        $.ajax({
            url: '/search_products',
            data: { query: query },
            success: function(response) {
                var products = response.products;
                var productList = $('#product-list');
                productList.empty();

                // Crear un objeto para almacenar productos únicos
                var uniqueProducts = {};

                products.forEach(function(product) {
                    var productName = product.nombre;
                    
                    // Agregar el producto al objeto de productos únicos
                    uniqueProducts[productName] = true;
                });

                // Recorrer los productos únicos y agregarlos a la lista desplegable
                for (var productName in uniqueProducts) {
                    var option = $('<option>').attr('value', productName);
                    productList.append(option);
                }
            }
        });
    });
});

        function search() {
            var productName = $('#search').val();
            $.ajax({
                url: '/search_products',
                data: { query: productName },
                success: function(response) {
                    var products = response.products;
                    var tableBody = $('#product-table tbody');
                    tableBody.empty();
                    products.forEach(function(product) {
                        var row = $('<tr>');
                        row.append($('<td>').text(product.nombre));
                        row.append($('<td>').text(product.proveedor));
                        row.append($('<td>').text(product.precio_compra));
                        row.append($('<td>').text(product.fecha_compra));
                        row.append($('<td>').text(product.Numero_factura));    
                        row.append($('<td>').text(product.Cantidad));
                        tableBody.append(row);
                    });
                }
            });
        }
    </script>
</head>
<body>
    <h1>Consulta de Compras</h1>
    <input type="text" id="search" list="product-list" placeholder="Buscar producto...">
    <datalist id="product-list"></datalist>
    <button onclick="search()">Buscar</button>
    <table id="product-table">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Proveedor</th>
                <th>Precio de Compra</th>
                <th>Fecha de Compra</th>
                <th>n° de factura</th>
                <th>Cantidad</th>
            </tr>
        </thead>
        <tbody>
            <!-- Los productos se mostrarán aquí -->
        </tbody>
    </table>
</body>
</html>
